"$schema" = "https://starship.rs/config-schema.json"

add_newline = false 

format = """
[┌─](#bb9af7)$directory$git_branch$git_status$cmd_duration$python$status
[└─](#bb9af7)$character"""

[character]
error_symbol = "[✗](bold #f7768e)"
success_symbol = "[❯](bold #9ece6a)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
style = "bold #7dcfff"
repo_root_style = "bold #7aa2f7"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic bold #bb9af7"

[git_status]
format     = '([$all_status$ahead_behind]($style) )'
style      = "bold #e0af68"
ahead      = "⇡${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
behind     = "⇣${count}"
conflicted = "=${count}"
up_to_date = ""
untracked  = "?${count}"
modified   = "!${count}"
stashed    = "*${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✗ "
style = "bold #f7768e"

