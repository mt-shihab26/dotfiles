"$schema" = "https://starship.rs/config-schema.json"

add_newline = false 

format = """
[┌─](#9A9A10A)$directory$git_branch$git_status$cmd_duration$python$status
[└─](#9A9A9A)$character"""

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✗ "
style = "bold #FF5C57"

