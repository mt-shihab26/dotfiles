# include ~/.config/kitty/overwrite.conf

font_size               12

window_padding_width    2
window_padding_height   2

shell                   bash -c "~/.bin/init; exec bash"

kitty_mod               ctrl+shift

tab_bar_style           hidden

map kitty_mod+t         no_op
map kitty_mod+q         no_op
map kitty_mod+w         no_op
map kitty_mod+]         no_op
map kitty_mod+[         no_op

map kitty_mod+c         copy_to_clipboard
map kitty_mod+v         paste_from_clipboard

map kitty_mod+p         launch --type=window bash -c "~/.bin/sessionizer projects"
map kitty_mod+o         launch --type=window bash -c "~/.bin/sessionizer tmp"
map kitty_mod+l         launch --type=window bash -c "~/.bin/sessionizer learns"

# Enable extended keyboard protocol for better key handling
# This allows Ctrl+number keys to work properly in tmux

# Pass Ctrl+number keys to tmux for browser-like tab switching
map ctrl+1 send_text all \x1b[49;5u
map ctrl+2 send_text all \x1b[50;5u
map ctrl+3 send_text all \x1b[51;5u
map ctrl+4 send_text all \x1b[52;5u
map ctrl+5 send_text all \x1b[53;5u
map ctrl+6 send_text all \x1b[54;5u
map ctrl+7 send_text all \x1b[55;5u
map ctrl+8 send_text all \x1b[56;5u
map ctrl+9 send_text all \x1b[57;5u

# Pass Shift+Left/Right to tmux for browser-like tab switching
map shift+left send_text all \x1b[1;2D
map shift+right send_text all \x1b[1;2C

