general.import = [ 
  "~/.config/omarchy/current/theme/alacritty.toml",
]

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[terminal.shell]
program = "bash"
args = ["-c", "~/.bin/init; exec bash"]

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 12

[window]
padding.x = 2
padding.y = 2
decorations = "None"

[[keyboard.bindings]]
key = "Insert"
mods = "Shift"
action = "Paste"

[[keyboard.bindings]]
key = "Insert"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# Custom session launcher bindings
[[keyboard.bindings]]
key = "P"
mods = "Control|Shift"
command = { program = "bash", args = ["-c", "~/.bin/sessionizer projects"] }

[[keyboard.bindings]]
key = "O"
mods = "Control|Shift"
command = { program = "bash", args = ["-c", "~/.bin/sessionizer tmp"] }

[[keyboard.bindings]]
key = "L"
mods = "Control|Shift"
command = { program = "bash", args = ["-c", "~/.bin/sessionizer learns"] }

# Ctrl+number keys for tmux tab switching
[[keyboard.bindings]]
key = "Key1"
mods = "Control"
chars = "\u001b[49;5u"

[[keyboard.bindings]]
key = "Key2"
mods = "Control"
chars = "\u001b[50;5u"

[[keyboard.bindings]]
key = "Key3"
mods = "Control"
chars = "\u001b[51;5u"

[[keyboard.bindings]]
key = "Key4"
mods = "Control"
chars = "\u001b[52;5u"

[[keyboard.bindings]]
key = "Key5"
mods = "Control"
chars = "\u001b[53;5u"

[[keyboard.bindings]]
key = "Key6"
mods = "Control"
chars = "\u001b[54;5u"

[[keyboard.bindings]]
key = "Key7"
mods = "Control"
chars = "\u001b[55;5u"

[[keyboard.bindings]]
key = "Key8"
mods = "Control"
chars = "\u001b[56;5u"

[[keyboard.bindings]]
key = "Key9"
mods = "Control"
chars = "\u001b[57;5u"

# Shift+Left/Right for tmux tab switching
[[keyboard.bindings]]
key = "Left"
mods = "Shift"
chars = "\u001b[1;2D"

[[keyboard.bindings]]
key = "Right"
mods = "Shift"
chars = "\u001b[1;2C"
