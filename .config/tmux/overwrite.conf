# source-file ~/.config/tmux/overwrite.conf

# status-bar
set -g status-position top
set -g @tokyo-night-tmux_show_datetime 0 # hide datetime
set -g @tokyo-night-tmux_show_path 0 # hide path
set -g @tokyo-night-tmux_show_music 0 # show music

# Show only command name in window status
set -g window-status-format "#I:#W"
set -g window-status-current-format "#I:#W"
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Browser-like tab switching with Shift+Arrow keys
bind -n S-Left previous-window
bind -n S-Right next-window

# Browser-like tab switching with Ctrl+number
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

run '~/.tmux/plugins/tpm/tpm'

